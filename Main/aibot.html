<!DOCTYPE html>
<html lang="th">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>AI for lonely people</title>

  <!-- Bootstrap (ใช้ได้เหมือนเดิม) -->
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0-alpha3/dist/css/bootstrap.min.css" rel="stylesheet"/>

  <style>
    :root{
      --blue-700:#1a73e8;
      --blue-600:#1976d2;
      --blue-500:#3b82f6;
      --blue-300:#90caf9;
      --blue-100:#e3f2fd;
      --blue-50:#f1f8ff;
      --ink-900:#0f172a;
      --ink-700:#334155;
      --ink-600:#475569;
      --white:#ffffff;
    }

    /* พื้นหลังเว็บไซต์ */
    body{
      background: linear-gradient(180deg, #e6f3ff 0%, #ffffff 100%);
      min-height:100vh;
      margin:0;
      padding:0;
      color:var(--ink-900);
    }

    /* Navbar ฟ้า-ขาว */
    .nav-container{
      display:flex;
      justify-content:space-between;
      align-items:center;
      padding:12px 20px;
      background: linear-gradient(90deg, var(--blue-700), var(--blue-500));
      color:var(--white);
      box-shadow:0 4px 10px rgba(26,115,232,.18);
    }
    .nav-right a{
      margin-left:16px;
      text-decoration:none;
      color:#eaf2ff;
      font-weight:600;
    }
    .nav-right a:hover{ color:#ffffff; text-decoration:underline; }

    .nav-left .profile-img{
      width:40px; height:40px; border-radius:50%;
      object-fit:cover; border:2px solid rgba(255,255,255,.6);
      display:block;
    }

    /* รูปโปรไฟล์ AI */
    .ai-avatar{
      width:120px; height:120px; margin:24px auto 12px;
      border-radius:50%;
      background: radial-gradient(circle at 30% 30%, var(--blue-300), var(--blue-100));
      box-shadow: 0 6px 20px rgba(26,115,232,.25);
    }

    /* กล่องแชททั้งหมด */
    .chat-container{
      max-width: 680px;
      margin: 0 auto 48px;
      background: var(--white);
      border-radius: 12px;
      box-shadow: 0 10px 30px rgba(26,115,232,.12);
      overflow:hidden;
      border:1px solid #e6efff;
    }

    /* พื้นที่แสดงข้อความแชท */
    .chat-messages{
      height: 600px;
      overflow-y:auto;
      padding:20px;
      background: linear-gradient(180deg, var(--blue-50), #ffffff);
    }

    /* ข้อความทั่วไป */
    .message{
      padding:10px 14px;
      margin-bottom:12px;
      border-radius:14px;
      max-width:75%;
      word-wrap:break-word;
      clear:both;
      line-height:1.5;
      box-shadow:0 2px 8px rgba(15,23,42,.06);
    }

    /* ข้อความผู้ใช้ (ฟ้าไล่โทน) */
    .message.user{
      background: linear-gradient(135deg, var(--blue-500) 0%, var(--blue-700) 100%);
      color:#fff;
      float:right;
      border-top-right-radius:6px;
    }

    /* ข้อความ AI (ขาวขอบฟ้าอ่อน) */
    .message.response{
      background:#ffffff;
      color:var(--ink-900);
      float:left;
      border:1px solid #e0ecff;
      border-top-left-radius:6px;
    }

    /* พื้นที่ป้อนข้อความ */
    .input-area{
      padding:12px;
      background:#f9fbff;
      border-top:1px solid #e6efff;
    }
    .form-control{
      border:1px solid #d6e6ff;
      background:#ffffff;
    }
    .form-control:focus{
      border-color: var(--blue-600);
      box-shadow: 0 0 0 .2rem rgba(26,115,232,.15);
    }

    /* ปุ่มส่ง */
    .btn-primary{
      background: linear-gradient(135deg, var(--blue-600), var(--blue-700));
      border:none;
      box-shadow: 0 4px 12px rgba(26,115,232,.25);
    }
    .btn-primary:hover{
      background: linear-gradient(135deg, var(--blue-700), var(--blue-600));
      box-shadow: 0 6px 16px rgba(26,115,232,.35);
    }

    /* ข้อความแจ้งเตือน */
    #error-message{
      color:#d32f2f;
      margin-top:10px;
      display:none;
    }
  </style>
</head>
<body>
  <!-- Navbar -->
  <!--<div class="nav-container">
    <div class="nav-left">
      <img src="{{ url_for('static', filename='img/DALLE.png') }}"
           alt="Logo" height="30" width="30" class="profile-img"/>
    </div>
    <div class="nav-right">
      <a href="index.html">หน้าแรก</a>
      <a href="">เครดิต</a>
    </div>
  </div>
-->
  <!-- อวตาร AI (เอฟเฟกต์ฟ้าอ่อน) -->
  <div class="ai-avatar"></div>

  <!-- กล่องแชท -->
  <div class="chat-container">
    <div class="chat-messages" id="chatMessages"></div>
    <div class="input-area">
      <form id="messageForm" onsubmit="return sendMessage(event)">
        <div class="input-group">
          <input type="text" id="messageInput" class="form-control" placeholder="พิมพ์ข้อความของคุณที่นี่..."/>
          <button type="submit" class="btn btn-primary">ส่ง</button>
        </div>
      </form>
      <div id="error-message"></div>
    </div>
  </div>

  <script>
    // ดึงอ้างอิง DOM
    const messageForm = document.getElementById('messageForm');
    const messageInput = document.getElementById('messageInput');
    const chatMessages = document.getElementById('chatMessages');
    const errorMessage = document.getElementById('error-message');

    // ส่งข้อความ
    async function sendMessage(event){
      event.preventDefault();
      const message = messageInput.value.trim();

      if(!message){
        showError('กรุณาพิมพ์ข้อความ');
        return false;
      }

      addMessage(message, 'user');
      messageInput.value = '';

      try{
        const response = await fetch('/api', {
          method:'POST',
          headers:{ 'Content-Type':'application/json' },
          body: JSON.stringify({ message })
        });

        if(!response.ok){
          throw new Error(`HTTP error! status: ${response.status}`);
        }

        const data = await response.json();
        if(data.response){
          addMessage(data.response, 'response');
        }else{
          showError('ไม่ได้รับการตอบกลับจากระบบ');
        }
      }catch(err){
        console.error(err);
        showError('ไม่สามารถส่งข้อความได้ กรุณาลองใหม่อีกครั้ง');
      }
      return false;
    }

    // เพิ่มข้อความลงห้องแชท
    function addMessage(content, type){
      const messageDiv = document.createElement('div');
      messageDiv.classList.add('message', type);
      messageDiv.textContent = content;
      chatMessages.appendChild(messageDiv);
      chatMessages.scrollTop = chatMessages.scrollHeight;
    }

    // แสดง error ชั่วคราว
    function showError(msg){
      errorMessage.textContent = msg;
      errorMessage.style.display = 'block';
      setTimeout(()=> errorMessage.style.display = 'none', 3000);
    }

    // Enter เพื่อส่ง
    document.getElementById('messageInput').addEventListener('keypress', (e)=>{
      if(e.key === 'Enter'){
        e.preventDefault();
        sendMessage(e);
      }
    });

    // ข้อความต้อนรับ
    window.addEventListener('load', ()=>{
      addMessage('สวัสดีค่ะ ยินดีต้อนรับสู่ AI For Lonely People! ธีมใหม่ฟ้า-ขาวพร้อมใช้งาน มีอะไรให้ช่วยไหมคะ?', 'response');
    });
  </script>
</body>
</html>
