<!DOCTYPE html>
<html lang="th">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>สมัครสมาชิก | AI Health Analyze</title>
  <style>
    body {
      background: #f7f9fa;
      min-height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
      font-family: 'Sarabun', sans-serif;
    }
    .signup-container {
      background: #fff;
      padding: 2.5rem 2rem;
      border-radius: 16px;
      box-shadow: 0 4px 24px rgba(0,0,0,0.07);
      width: 100%;
      max-width: 400px;
    }
    h2 {
      text-align: center;
      color: #2196F3;
      margin-bottom: 1.5rem;
      font-size: 2rem;
      font-weight: bold;
    }
    .form-group {
      margin-bottom: 1.2rem;
    }
    label {
      display: block;
      margin-bottom: 0.5rem;
      color: #333;
      font-size: 1rem;
    }
    input {
      width: 100%;
      padding: 0.75rem;
      border: 1px solid #e0e0e0;
      border-radius: 8px;
      font-size: 1rem;
      background: #f9f9f9;
      transition: border 0.2s;
    }
    input:focus {
      border-color: #2196F3;
      outline: none;
      background: #fff;
    }
    .signup-btn {
      width: 100%;
      background: #2196F3;
      color: #fff;
      padding: 0.85rem;
      border: none;
      border-radius: 8px;
      font-size: 1.1rem;
      font-weight: bold;
      cursor: pointer;
      margin-top: 0.5rem;
      transition: background 0.2s;
    }
    .signup-btn:hover {
      background: #1976D2;
    }
    .login-link {
      text-align: center;
      margin-top: 1.5rem;
      color: #666;
      font-size: 1rem;
    }
    .login-link a {
      color: #2196F3;
      text-decoration: none;
      font-weight: bold;
    }
    .login-link a:hover {
      text-decoration: underline;
    }
  </style>
</head>
<body>
  <div class="signup-container">
    <h2>สมัครสมาชิก</h2>
    <form id="signupForm">
      <div class="form-group">
        <label for="email">อีเมล</label>
        <input type="email" id="email" name="email" placeholder="กรอกอีเมล" required>
      </div>
      <div class="form-group">
        <label for="password">รหัสผ่าน</label>
        <input type="password" id="password" name="password" placeholder="กรอกรหัสผ่าน" required>
      </div>
      <div class="form-group">
        <label for="confirmPassword">ยืนยันรหัสผ่าน</label>
        <input type="password" id="confirmPassword" name="confirmPassword" placeholder="กรอกยืนยันรหัสผ่าน" required>
      </div>
      <button type="submit" class="signup-btn">สมัครสมาชิก</button>
    </form>
    <div class="login-link">
      มีบัญชีแล้ว? <a href="index.html">เข้าสู่ระบบ</a>
    </div>
  </div>
  <script>
    document.getElementById('signupForm').addEventListener('submit', function(e) {
      e.preventDefault();
      const email = document.getElementById('email').value.trim();
      const password = document.getElementById('password').value;
      const confirmPassword = document.getElementById('confirmPassword').value;
      if (password !== confirmPassword) {
        alert('รหัสผ่านไม่ตรงกัน');
        return;
      }
      // TODO: เชื่อมต่อ Firebase หรือ backend สำหรับสมัครสมาชิก
      alert('สมัครสมาชิกสำเร็จ (ตัวอย่าง)');
      window.location.href = "index.html";
    });
  </script>
</body>
