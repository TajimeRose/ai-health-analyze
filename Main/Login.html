<!DOCTYPE html>
<html lang="th">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>เข้าสู่ระบบ | AI Health Analyze</title>
  <style>
    body {
      background: #f7f9fa;
      min-height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
      font-family: 'Sarabun', sans-serif;
    }
    .login-container {
      background: #fff;
      padding: 2.5rem 2rem;
      border-radius: 16px;
      box-shadow: 0 4px 24px rgba(0,0,0,0.07);
      width: 100%;
      max-width: 400px;
    }
    h2 {
      text-align: center;
      color: #2196F3;
      margin-bottom: 1.5rem;
      font-size: 2rem;
      font-weight: bold;
    }
    .form-group {
      margin-bottom: 1.2rem;
    }
    label {
      display: block;
      margin-bottom: 0.5rem;
      color: #333;
      font-size: 1rem;
    }
    input {
      width: 100%;
      padding: 0.75rem;
      border: 1px solid #e0e0e0;
      border-radius: 8px;
      font-size: 1rem;
      background: #f9f9f9;
      transition: border 0.2s;
    }
    input:focus {
      border-color: #2196F3;
      outline: none;
      background: #fff;
    }
    .login-btn {
      width: 100%;
      background: #2196F3;
      color: #fff;
      padding: 0.85rem;
      border: none;
      border-radius: 8px;
      font-size: 1.1rem;
      font-weight: bold;
      cursor: pointer;
      margin-top: 0.5rem;
      transition: background 0.2s;
    }
    .login-btn:hover {
      background: #1976D2;
    }
    .signup-link {
      text-align: center;
      margin-top: 1.5rem;
      color: #666;
      font-size: 1rem;
    }
    .signup-link a {
      color: #2196F3;
      text-decoration: none;
      font-weight: bold;
    }
    .signup-link a:hover {
      text-decoration: underline;
    }
  </style>
</head>
<body>
  <div class="login-container">
    <h2>เข้าสู่ระบบ</h2>
    <form id="loginForm">
      <div class="form-group">
        <label for="userInput">อีเมลหรือรหัสผ่าน</label>
        <input type="text" id="userInput" name="userInput" placeholder="กรอกอีเมลหรือรหัสผ่าน" required>
      </div>
      <div class="form-group"> 
        <label for="password">รหัสผ่าน</label>
        <input type="password" id="password" name="password" placeholder="กรอกรหัสผ่าน" required>
      </div>
      <button type="submit" class="login-btn">เข้าสู่ระบบ</button>
    </form>
    <div class="signup-link">
      ยังไม่มีบัญชี? <a href="signup.html">สมัครสมาชิก</a>
    </div>
  </div>
  <script>
    document.getElementById('loginForm').addEventListener('submit', function(e) {
      e.preventDefault();
      const userInput = document.getElementById('userInput').value.trim();
      const password = document.getElementById('password').value;
      // TODO: เชื่อมต่อ backend สำหรับเข้าสู่ระบบ
      alert('เข้าสู่ระบบสำเร็จ (ตัวอย่าง)');
      window.location.href = "index.html";
    });
  </script>
</body>
